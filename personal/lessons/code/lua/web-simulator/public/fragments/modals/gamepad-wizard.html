    <!-- Gamepad Wizard Modal -->
    <div id="gp-wizard-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content gp-wizard-modal">
            <div class="modal-header">
                <span class="modal-title">Мастер настройки пульта</span>
                <button id="gp-wizard-close" class="modal-close-btn">✕</button>
            </div>
            <div class="gp-wizard-body">
                <div id="gp-wizard-step-container">
                    <div class="gp-wizard-step">
                        <div id="gp-wizard-instruction" class="gp-wizard-instruction">Подвигайте стик газа вверх и вниз</div>
                        <div class="gp-wizard-visual">
                            <div id="gp-wizard-drone-card" class="gp-wizard-drone-card">
                                <div class="gp-wizard-drone-stage">
                                    <div id="gp-wizard-drone-viewport" class="gp-wizard-drone-viewport" aria-hidden="true"></div>
                                </div>
                                <div class="gp-wizard-drone-meta">
                                    <div id="gp-wizard-axis-label" class="gp-wizard-axis-label">Газ</div>
                                    <div id="gp-wizard-axis-hint" class="gp-wizard-axis-hint">Если дрон реагирует наоборот, включите инверсию прямо здесь.</div>
                                </div>
                            </div>
                        </div>
                        <div class="gp-wizard-stick-panel" aria-hidden="true">
                            <div id="gp-wizard-stick-card-left" class="gp-wizard-stick-card">
                                <div class="gp-wizard-stick-title">Левый стик</div>
                                <div class="gp-wizard-stick-shell">
                                    <div class="gp-wizard-stick-guides"></div>
                                    <div id="gp-wizard-stick-left" class="gp-wizard-stick-knob"></div>
                                </div>
                                <div class="gp-wizard-stick-legend">Газ / Рыскание</div>
                            </div>
                            <div id="gp-wizard-stick-card-right" class="gp-wizard-stick-card">
                                <div class="gp-wizard-stick-title">Правый стик</div>
                                <div class="gp-wizard-stick-shell">
                                    <div class="gp-wizard-stick-guides"></div>
                                    <div id="gp-wizard-stick-right" class="gp-wizard-stick-knob"></div>
                                </div>
                                <div class="gp-wizard-stick-legend">Тангаж / Крен</div>
                            </div>
                        </div>
                        <div id="gp-wizard-primary-controls" class="gp-wizard-primary-controls">
                            <label id="gp-wizard-invert-wrap" class="checkbox-container gp-wizard-invert-checkbox">
                                <input type="checkbox" id="gp-wizard-invert">
                                <span class="checkmark gp-checkmark"></span>
                                Инвертировать текущий канал
                            </label>
                        </div>
                        <div id="gp-wizard-status" class="gp-wizard-status">Ожидание движения...</div>
                    </div>
                </div>
                <div id="gp-wizard-summary" class="gp-wizard-summary" style="display: none;">
                    <div class="gp-wizard-summary-lead">Мастер собрал каналы и диапазоны. Проверьте результат перед применением.</div>
                    <div id="gp-wizard-summary-content"></div>
                </div>
                <div class="gp-wizard-footer">
                    <button id="gp-wizard-prev" class="btn-secondary" disabled>Назад</button>
                    <button id="gp-wizard-next" class="btn-primary">Далее</button>
                </div>
            </div>
        </div>
    </div>
