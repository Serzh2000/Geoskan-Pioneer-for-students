        <header class="header">
            <div class="header-brand">
                <div class="header-brand-mark">G</div>
                <div class="header-brand-copy">
                    <div class="header-logo">Geoscan <span>Симулятор</span></div>
                    <div class="header-meta">Инженерная полетная среда</div>
                </div>
            </div>
            <div class="header-actions">
                <div class="header-controls-group">
                    <select id="file-selector" class="btn-secondary header-select">
                        <option value="">Выберите пример...</option>
                    </select>
                    <button onclick="document.getElementById('file-input').click()" class="btn-secondary" title="Открыть файл">ОТКРЫТЬ ФАЙЛ</button>
                    <input type="file" id="file-input" style="display:none" accept=".lua,.py">
                    <select id="script-language-select" class="btn-secondary header-select header-lang-select">
                        <option value="lua">Lua</option>
                        <option value="python">Python</option>
                    </select>
                    <label class="header-check">
                        <input type="checkbox" id="blockly-editor-toggle">
                        <span>Режим Blockly</span>
                    </label>
                </div>
                <div class="header-controls-group header-controls-group--actions">
                    <button id="run-btn" class="btn-primary">ЗАПУСТИТЬ</button>
                    <button id="stop-btn" class="btn-secondary header-danger-btn">СТОП</button>
                    <button id="restart-btn" class="btn-secondary">СБРОС</button>
                </div>
            </div>
        </header>
