        <section class="scene-stage">
            <div class="scene-viewport-card">
                <div class="scene-viewport-header">
                    <div class="scene-viewport-label">Полетная зона</div>
                </div>
                <div class="scene-container">
                    <div id="canvas-container"></div>
                    <div id="fpv-overlay">
                        <div class="fpv-header">
                            <div class="fpv-cam-info">
                                <div>OV2640 [1600x1200]</div>
                                <div>FPS: 24</div>
                            </div>
                        </div>
                    </div>

                    <div class="camera-controls">
                        <button onclick="setCameraMode('ground')">Земля</button>
                        <button onclick="setCameraMode('drone')">Дрон</button>
                        <button onclick="setCameraMode('fpv')">FPV</button>
                        <button onclick="setCameraMode('free')">Свободно</button>
                    </div>
                </div>
            </div>
        </section>

        <aside class="hud-side-column">
            <div class="dashboard-toolbar">
                <div class="dashboard-card-title">Управление</div>
                <div class="hud-visibility-controls">
                    <button id="toggle-telemetry-btn" type="button" class="hud-visibility-btn active" aria-pressed="true">Метрики</button>
                    <button id="toggle-matrix-btn" type="button" class="hud-visibility-btn active" aria-pressed="true">Матрица</button>
                </div>
            </div>

            <div id="telemetry-overlay" class="telemetry-overlay dashboard-panel">
                <div class="dashboard-panel__header">
                    <span class="dashboard-panel__title">Метрики</span>
                    <span class="dashboard-panel__badge">Онлайн</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-item stat-item--primary">
                        <div class="stat-label">ВЫСОТА</div>
                        <div class="stat-value"><span id="state-alt">0.00</span><span>м</span></div>
                    </div>
                    <div class="stat-item stat-item--primary">
                        <div class="stat-label">СКОРОСТЬ</div>
                        <div class="stat-value"><span id="state-spd">0.0</span><span>м/с</span></div>
                    </div>
                    <div class="stat-item stat-item--primary">
                        <div class="stat-label">БАТАРЕЯ</div>
                        <div class="stat-value"><span id="state-bat">100</span><span>%</span></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">ВРЕМЯ ПОЛЕТА</div>
                        <div class="stat-value"><span id="state-time">0.0</span><span>с</span></div>
                    </div>
                    <div class="stat-item" id="hud-stat-mode" style="display: none;">
                        <div class="stat-label">РЕЖИМ</div>
                        <div class="stat-value"><span id="state-mode">АВТО</span></div>
                    </div>
                    <div class="stat-item stat-item--status">
                        <div class="stat-label">СТАТУС</div>
                        <div class="stat-value"><span id="state-status">ОЖИДАНИЕ</span></div>
                    </div>
                </div>
            </div>

            <div id="matrix-overlay" class="matrix-overlay dashboard-panel">
                <div class="dashboard-panel__header">
                    <span class="dashboard-panel__title">LED-матрица</span>
                    <span class="dashboard-panel__badge">5 x 5</span>
                </div>
                <div class="led-section-label">БОРТОВЫЕ ИНДИКАТОРЫ</div>
                <div class="led-base-grid">
                    <div id="led-base-0" class="led-pixel-base" title="Базовый светодиод 0"></div>
                    <div id="led-base-1" class="led-pixel-base" title="Базовый светодиод 1"></div>
                    <div id="led-base-2" class="led-pixel-base" title="Базовый светодиод 2"></div>
                    <div id="led-base-3" class="led-pixel-base" title="Базовый светодиод 3"></div>
                </div>
                <div class="led-section-label">МАТРИЦА 5x5</div>
                <div class="led-matrix-grid" id="led-matrix-grid"></div>
            </div>
        </aside>
