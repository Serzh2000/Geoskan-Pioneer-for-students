openapi: 3.0.0
info:
  title: Pioneer Lua Web Simulator API
  version: 1.0.0
  description: API для управления файлами и выполнения Lua-скриптов в симуляторе.
paths:
  /api/files:
    get:
      summary: Список всех доступных Lua-файлов в папке examples.
      responses:
        '200':
          description: Массив путей к файлам.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/files/{path}:
    get:
      summary: Получить содержимое конкретного Lua-файла.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Содержимое файла.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
        '404':
          description: Файл не найден.
